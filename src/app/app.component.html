<body>
  <div class="container">
    <!-- Left Half -->
    <div class="left-half">
      <h1 class="team-name-row">Team 1</h1>
      <h1 class="score-font">{{ team1Score }}</h1>
      <div class="score-button-container">
        <div class="score-button">
          <button class="score-button" (click)="incrementScore('team1')">+</button>
          <button class="score-button" (click)="decrementScore('team1')">-</button>
        </div>
      </div>
    </div>
  
    <!-- Right Half -->
    <div class="right-half">
      <h1 class="team-name-row">Team 2</h1>
      <h1 class="score-font">{{team2Score}}</h1>
      <div class="score-button-container">
        <div class="score-button">
          <button class="score-button" (click)="incrementScore('team2')">+</button>
          <button class="score-button" (click)="decrementScore('team2')">-</button>
        </div>
      </div>
    </div>
  </div>
  <div class="reset-button-container">
    <div class="reset-button">
      <button (click)="resetScores()">Reset Scores</button>
    </div>
  </div>
  <div class="wallpaper-button-container">
    <div class="wallpaper-button">
      <button class="button-spacer" (click)="setBodyBackground('assets/images/haikyuu_season_1_background.webp')">Haikyuu</button>
      <button class="button-spacer" (click)="setBodyBackground('assets/images/Random_Volleyball_Game.avif')">Volleyball Game</button>
      <button class="button-spacer" (click)="setBodyBackground('assets/images/Barry_Allen_Flash_Meme_3.png')">The Flash</button>
      <button class="button-spacer" (click)="setBodyBackground('assets/images/Devastation_Pic.jpg')">Devastation</button>
      <button class="button-spacer" (click)="setBodyBackground('assets/images/CTA_Map.png')">The CTA</button>
    </div>
  </div>
</body>
